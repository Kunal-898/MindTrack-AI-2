<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MINDTRACK — AI Mental Wellness</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.0/dist/Recharts.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --mint: #02C39A;
      --teal: #028090;
      --deep: #05668D;
      --sky: #e0f4f8;
      --cream: #F8FFFE;
      --text: #0d2b36;
      --muted: #5a7f8c;
      --glass: rgba(255,255,255,0.72);
      --glass-border: rgba(255,255,255,0.55);
      --joy: #F59E0B;
      --sadness: #6366F1;
      --anger: #EF4444;
      --fear: #8B5CF6;
      --calm: #10B981;
      --stress: #F97316;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); overflow-x: hidden; }
    h1, h2, h3, .serif { font-family: 'DM Serif Display', serif; }

    /* Glassmorphism */
    .glass { background: var(--glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--glass-border); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #b2d8e4; border-radius: 99px; }

    /* Animations */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes blob1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(30px,-20px) scale(1.07)} 66%{transform:translate(-20px,10px) scale(0.95)} }
    @keyframes blob2 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-25px,15px) scale(1.05)} 66%{transform:translate(20px,-10px) scale(0.97)} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes dash { to { stroke-dashoffset: 0; } }
    @keyframes barGrow { from { width: 0; } to { width: var(--bar-w); } }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    .anim-up { animation: fadeUp 0.5s ease both; }
    .anim-in { animation: fadeIn 0.4s ease both; }
    .blob1 { animation: blob1 10s ease-in-out infinite; }
    .blob2 { animation: blob2 12s ease-in-out infinite; }

    .btn-primary {
      background: linear-gradient(135deg, var(--teal), var(--mint));
      color: white; border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-weight: 500;
      transition: all 0.2s; position: relative; overflow: hidden;
    }
    .btn-primary:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(2,192,154,0.3); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; filter: none; box-shadow: none; }
    .btn-outline {
      background: white; border: 1.5px solid #d1e8ec; color: var(--text);
      cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500;
      transition: all 0.2s;
    }
    .btn-outline:hover { background: var(--sky); border-color: var(--teal); }

    .nav-item { transition: all 0.2s; cursor: pointer; }
    .nav-item:hover { background: rgba(2,192,154,0.1); }
    .nav-item.active { background: linear-gradient(135deg, var(--teal), var(--mint)); color: white; }
    .nav-item.active svg { stroke: white !important; }

    .page { display: none; }
    .page.active { display: flex; }

    textarea { font-family: 'DM Sans', sans-serif; }
    input { font-family: 'DM Sans', sans-serif; }

    .emotion-bar { height: 8px; border-radius: 99px; background: #e8f4f8; overflow: hidden; }
    .emotion-fill { height: 100%; border-radius: 99px; animation: barGrow 0.8s ease both; }

    .mood-dot { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; font-size: 11px; font-weight: 600; color: white; }
    .mood-dot:hover { transform: scale(1.15); }

    /* Modal */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(5,30,40,0.5); backdrop-filter: blur(6px); z-index: 100; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s ease; }
    .modal-card { animation: fadeUp 0.3s ease; max-height: 90vh; overflow-y: auto; }

    .typing-dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--mint); margin: 0 2px; animation: pulse 1.2s ease infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* Sidebar */
    .sidebar { width: 76px; min-width: 76px; flex-shrink: 0; }
    @media (max-width: 768px) { .sidebar { display: none; } }

    /* Chart tooltip */
    .recharts-tooltip-wrapper { z-index: 50; }
  </style>
</head>
<body>
<div id="root"></div>

// ─── Mock data ────────────────────────────────────────────────────────────────
const wellnessData = [

const quotes = [

// ─── Backend API Config ───────────────────────────────────────────────────────
const // ── Backend URL ──────────────────────────────────────────────────────────────
// Replace YOUR_RENDER_URL below with your actual Render service URL
// e.g. https://mindtrack-api.onrender.com
const RENDER_URL = "https://YOUR_RENDER_URL.onrender.com";

const API_BASE = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
  ? "http://localhost:8000/api"       // local development
  : RENDER_URL + "/api";              // production (Render)

// Token helpers
const getToken  = () => localStorage.getItem("mt_token") || "";
const saveToken = (t) => localStorage.setItem("mt_token", t);
const dropToken = () => localStorage.removeItem("mt_token");

// Generic authenticated fetch
async function apiFetch(path, opts = {}) {
  const token = getToken();
  const res = await fetch(API_BASE + path, {
    ...opts,
    headers: {
      "Content-Type": "application/json",
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: "Request failed" }));
    throw new Error(err.detail || "Request failed");
  }
  return res.json();
}

// Auth helpers
async function apiLogin(email, password) {
  const data = await apiFetch("/auth/login", {
    method: "POST",
    body: JSON.stringify({ email, password }),
  });
  saveToken(data.token);
  return data.user;
}
async function apiRegister(email, name, password) {
  const data = await apiFetch("/auth/register", {
    method: "POST",
    body: JSON.stringify({ email, name, password }),
  });
  saveToken(data.token);
  return data.user;
}
async function apiLogout() {
  try { await apiFetch("/auth/logout", { method: "POST" }); } catch {}
  dropToken();
}

// Core analysis — calls DistilRoBERTa + Claude on the server
async function analyzeWithClaude(text) {
  return apiFetch("/analyze", { method: "POST", body: JSON.stringify({ text }) });
}

// Journal entries
async function apiSaveEntry(text, mood_label, analysis) {
  return apiFetch("/entries", { method: "POST", body: JSON.stringify({ text, mood_label }) });
}
async function apiFetchEntries() {
  const data = await apiFetch("/entries?limit=20");
  return data.entries || [];
}

function EmotionModal({ result, onClose, onSave }) {
  if (!result) return null;
  const top = [...result.emotions].sort((a,b)=>b.percentage-a.percentage).slice(0,4);
  const pieParts = top.map(e=>({name:e.emotion, value:e.percentage, color:emotionColors[e.emotion]||"#94a3b8"}));

    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-card glass" onClick={e=>e.stopPropagation()} style={{borderRadius:28, padding:32, width:"min(520px,95vw)", position:"relative"}}>

        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>

            <Icons.Sparkles size={20} color="#fff"/>

        </div>

        <div style={{background:"linear-gradient(135deg,rgba(2,128,144,.07),rgba(2,195,154,.07))",borderRadius:16,padding:"14px 18px",marginBottom:20}}>
          <div style={{fontSize:12,color:"var(--muted)",marginBottom:3}}>Emotional Summary</div>
          <div style={{fontSize:14,color:"var(--text)",fontStyle:"italic"}}>{result.summary}</div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
          <div>
            <div style={{fontSize:13,fontWeight:500,color:"var(--text)",marginBottom:10}}>Detected Emotions</div>
            {top.map((e,i)=>(
              <div key={i} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:13,color:"var(--text)"}}>{e.emotion}</span>
                  <span style={{fontSize:13,fontWeight:600,color:emotionColors[e.emotion]||"#028090"}}>{e.percentage}%</span>
                </div>
                <div className="emotion-bar"><div className="emotion-fill" style={{"--bar-w":`${e.percentage}%`,width:`${e.percentage}%`,background:emotionColors[e.emotion]||"#02C39A"}}/></div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
            <div style={{fontSize:13,fontWeight:500,marginBottom:8,alignSelf:"flex-start"}}>Distribution</div>
            <PieChart width={140} height={140}>
              <Pie data={pieParts} cx={70} cy={70} innerRadius={35} outerRadius={60} paddingAngle={3} dataKey="value">
                {pieParts.map((p,i)=><Cell key={i} fill={p.color}/>)}
              </Pie>
            </PieChart>
            <div style={{fontSize:12,color:"var(--muted)",textAlign:"center"}}>Dominant: <strong style={{color:emotionColors[result.dominant]}}>{result.dominant}</strong></div>
          </div>
        </div>

        <div style={{fontSize:13,fontWeight:500,marginBottom:8}}>Wellness Index</div>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
          <div style={{flex:1,height:10,borderRadius:99,background:"#e0f4f8",overflow:"hidden"}}>
            <div style={{height:"100%",width:`${result.wellnessIndex}%`,background:"linear-gradient(90deg,#028090,#02C39A)",borderRadius:99,transition:"width 1s"}}/>
          </div>
          <span style={{fontWeight:700,fontSize:18,color:result.wellnessIndex>60?"#028090":"#F97316"}}>{result.wellnessIndex}</span>
        </div>

        {result.triggers?.length > 0 && (
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:500,marginBottom:7}}>Key Triggers Detected</div>

function CircleGauge({ value, label, color }) {
  const r = 60, c = 2*Math.PI*r;
  const offset = c * (1 - value/100);
  return (
    <svg width={140} height={140} viewBox="0 0 140 140">
      <defs>
        <linearGradient id="gaugeg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor="#028090"/>
          <stop offset="100%" stopColor="#02C39A"/>
        </linearGradient>
      </defs>
      <circle cx={70} cy={70} r={r} stroke="#e0f4f8" strokeWidth={11} fill="none"/>
      <circle cx={70} cy={70} r={r} stroke="url(#gaugeg)" strokeWidth={11} fill="none"
        strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round"
        transform="rotate(-90 70 70)" style={{transition:"stroke-dashoffset 1s ease"}}/>
      <text x={70} y={65} textAnchor="middle" fontFamily="DM Serif Display" fontSize={26} fill="#0d2b36">{value}</text>
      <text x={70} y={82} textAnchor="middle" fontFamily="DM Sans" fontSize={12} fill="#5a7f8c">{label}</text>
    </svg>
  );
}

    if (text.length < 20) return;

      setResult(res);

      // fallback mock

// ─── LOGIN PAGE ───────────────────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const handle = async (e) => {
    e.preventDefault();
    setLoading(true); setError("");
    try {
      const user = await apiLogin(email, pass);
      onLogin(user);
    } catch(err) {
      setError(err.message || "Login failed. Check your credentials.");
    } finally { setLoading(false); }
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden",background:"linear-gradient(135deg,#e8fdf8,#e0f6fd,#f0fffb)"}}>
      {/* Blobs */}
      <div className="blob1" style={{position:"absolute",top:"10%",left:"8%",width:320,height:320,borderRadius:"50%",background:"radial-gradient(circle,rgba(2,195,154,.25),transparent 70%)",filter:"blur(1px)"}}/>
      <div className="blob2" style={{position:"absolute",bottom:"12%",right:"10%",width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(2,128,144,.2),transparent 70%)",filter:"blur(1px)"}}/>

      <div className="glass anim-up" style={{borderRadius:28,padding:40,width:"min(420px,92vw)",position:"relative",zIndex:10}}>
        <div style={{textAlign:"center",marginBottom:30}}>
          <div style={{width:60,height:60,background:"linear-gradient(135deg,var(--teal),var(--mint))",borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}>
            <Icons.Brain size={28} color="#fff"/>
          </div>
          <div className="serif" style={{fontSize:32,marginBottom:6}}>MINDTRACK</div>
          <div style={{color:"var(--muted)",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <Icons.Sparkles size={14} color="var(--mint)"/>Your Mental Wellness Companion
          </div>
        </div>

        <form onSubmit={handle}>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:13,fontWeight:500,marginBottom:6,display:"block"}}>Email Address</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" required
              style={{width:"100%",border:"1.5px solid #d8eef2",borderRadius:12,padding:"11px 14px",fontSize:14,outline:"none",fontFamily:"DM Sans",background:"rgba(255,255,255,.85)",transition:"border-color .2s"}}
              onFocus={e=>e.target.style.borderColor="#028090"} onBlur={e=>e.target.style.borderColor="#d8eef2"}/>
          </div>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:13,fontWeight:500,marginBottom:6,display:"block"}}>Password</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" required
              style={{width:"100%",border:"1.5px solid #d8eef2",borderRadius:12,padding:"11px 14px",fontSize:14,outline:"none",fontFamily:"DM Sans",background:"rgba(255,255,255,.85)",transition:"border-color .2s"}}
              onFocus={e=>e.target.style.borderColor="#028090"} onBlur={e=>e.target.style.borderColor="#d8eef2"}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,fontSize:13}}>
            <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",color:"var(--muted)"}}>
              <input type="checkbox" style={{accentColor:"var(--teal)"}}/>Remember me
            </label>
            <a href="#" style={{color:"var(--teal)",textDecoration:"none",fontWeight:500}}>Forgot password?</a>
          </div>
          <button type="submit" className="btn-primary" disabled={loading} style={{width:"100%",padding:"13px",borderRadius:14,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {loading?<><span className="typing-dots"><span/><span/><span/></span>Signing in…</>:"Sign In"}
          </button>
          {error && <div style={{marginTop:10,padding:"9px 14px",background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.3)",borderRadius:10,fontSize:13,color:"#ef4444",textAlign:"center"}}>{error}</div>}
        </form>

        <div style={{display:"flex",alignItems:"center",margin:"20px 0",gap:12}}>
          <div style={{flex:1,height:1,background:"#d8eef2"}}/>
          <span style={{fontSize:12,color:"var(--muted)"}}>or</span>
          <div style={{flex:1,height:1,background:"#d8eef2"}}/>
        </div>

        <button className="btn-outline" onClick={onLogin} style={{width:"100%",padding:"11px",borderRadius:14,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <svg width={18} height={18} viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>

        <p style={{textAlign:"center",fontSize:13,color:"var(--muted)",marginTop:20}}>Don't have an account? <a href="#" style={{color:"var(--teal)",fontWeight:500,textDecoration:"none"}}>Sign up free</a></p>

        <div style={{display:"flex",justifyContent:"center",gap:20,marginTop:20,fontSize:12,color:"var(--muted)"}}>
          <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:6,height:6,borderRadius:"50%",background:"#10B981"}}/> Secure &amp; Private</div>
          <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:6,height:6,borderRadius:"50%",background:"var(--teal)"}}/> AI Powered</div>
        </div>
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [mainPage, setMainPage] = useState("login");
  const [dashPage, setDashPage] = useState("dashboard");
  const [saved, setSaved] = useState([]);

  const handleAnalysisComplete = (entry) => {
    setSaved(prev=>[entry,...prev.slice(0,19)]);
  };

  if (mainPage === "login") {
    return <LoginPage onLogin={()=>setMainPage("app")}/>;
  }

  return (
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      <NavSidebar page={dashPage} setPage={setDashPage} setMainPage={setMainPage}/>
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {dashPage === "dashboard" && <DashboardPage onAnalysisComplete={handleAnalysisComplete}/>}
        {dashPage === "analytics" && <AnalyticsPage saved={saved}/>}
        {dashPage === "settings" && <SettingsPage/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
